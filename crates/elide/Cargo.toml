# https://doc.rust-lang.org/cargo/reference/manifest.html

[package]
name = "elide"
description = "Composable component library for elide pipelines: recognizers, dedup layers, checks, redaction strategies"
keywords = ["elide", "toolkit", "components", "pipeline"]
categories = ["data-structures"]
readme = "README.md"

version = { workspace = true }
rust-version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
publish = { workspace = true }

authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []

## Re-export the pattern recognizer crate as `elide::pattern`.
pattern = ["dep:elide-pattern"]
## Re-export the NER crate as `elide::ner`.
ner = ["dep:elide-ner"]
## Re-export the LLM recognizer crate as `elide::llm`.
llm = ["dep:elide-llm"]
## Re-export the codec crate as `elide::codec`.
codec = ["dep:elide-codec"]
## Ship the no-op mock backends in the re-exported `ner`/`llm` crates.
mock = ["elide-ner?/mock", "elide-llm?/mock"]

[dependencies]
# Internal crates
elide-core = { workspace = true, features = [] }
elide-pattern = { workspace = true, features = [], optional = true }
elide-ner = { workspace = true, features = [], optional = true }
elide-llm = { workspace = true, features = [], optional = true }
elide-codec = { workspace = true, features = [], optional = true }

# Derive macros
derive_builder = { workspace = true, features = [] }

# Async runtime and parallelism
tokio = { workspace = true, features = ["rt", "sync", "macros"] }

# Observability
tracing = { workspace = true, features = [] }

# Hashing (the Hash operator)
sha2 = { workspace = true, features = [] }
hex = { workspace = true, features = [] }
bytes = { workspace = true, features = [] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
