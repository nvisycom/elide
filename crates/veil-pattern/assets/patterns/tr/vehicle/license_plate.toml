# Turkish license plate (plaka): province code 01-81 + 1-3
# letters (Turkish alphabet excludes Q, W, X) + 2-4 digits.
# Civilian format per Karayolları Trafik Kanunu Madde 23.

name = "tr-license-plate"
label = "license_plate"
countries = ["TR"]
languages = ["tr"]
context = [
  "plaka",
  "araç plakası",
  "plaka numarası",
  "kayıt plakası",
  "taşıt plakası",
  "tr plaka",
  "license plate",
  "number plate",
]

# Space-separated rendering: `34 ABC 1234`.
[[variants]]
regex = '\b(0[1-9]|[1-7]\d|8[01])\s?[A-PR-VY-Z]{1,3}\s?\d{2,4}\b'
score = 0.4

# Hyphen-separated rendering: `34-ABC-1234`.
[[variants]]
regex = '\b(0[1-9]|[1-7]\d|8[01])-[A-PR-VY-Z]{1,3}-\d{2,4}\b'
score = 0.5
