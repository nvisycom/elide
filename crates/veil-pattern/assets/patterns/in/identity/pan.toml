# Indian Permanent Account Number (PAN): 10-char alphanumeric
# `AAAAA9999A` issued by the Income Tax Department. The 4th
# character encodes the entity type per IT Department spec.

name = "in-pan"
label = "tax_id"
countries = ["IN"]
languages = ["en", "hi"]
context = [
  "pan",
  "permanent account number",
  "income tax",
  "pan card",
]

[[variants]]
regex = '\b[A-Z]{3}[ABCFGHJLPTabcfghjlpt][A-Z]\d{4}[A-Z]\b'
score = 0.5
validator = "in.pan"
