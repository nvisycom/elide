# Korean Resident Registration Number (RRN): 13 digits encoding
# birth date, gender/century, region, serial, and weighted Mod-11
# check digit. Format `YYMMDD-GHIJKLX`. Pre-October 2020 numbers
# carry the checksum; later issues use a random tail.

name = "kr-rrn"
label = "government_id"
countries = ["KR"]
languages = ["ko"]
context = [
  "rrn",
  "주민등록번호",
  "주민번호",
  "korean rrn",
  "korean resident registration number",
  "resident registration number",
]

# Hyphen-separated rendering.
[[variants]]
regex = '\b\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])-[1-4]\d{6}\b'
score = 0.5
validator = "kr.rrn"

# Glued rendering.
[[variants]]
regex = '\b\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])[1-4]\d{6}\b'
score = 0.4
validator = "kr.rrn"
