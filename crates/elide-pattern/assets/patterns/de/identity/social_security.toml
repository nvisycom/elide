# German Rentenversicherungsnummer (RVNR / SVNR): 12 characters
# encoding region + birth date + surname initial + serial + check
# digit per VKVV § 4 (Deutsche Rentenversicherung).

name = "de-social-security"
label = "national_insurance_number"
countries = ["DE"]
languages = ["de"]
