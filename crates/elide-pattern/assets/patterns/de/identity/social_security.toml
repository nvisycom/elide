  "rvnr",
  "svnr",
  "sv-nummer",
  "rentenversicherung",
  "deutsche rentenversicherung",
  "drv",
  "sozialversicherung",
]

[[variants]]
regex = '\b\d{8}[A-Z]\d{3}\b'
score = 0.5
validator = "de.social_security"
