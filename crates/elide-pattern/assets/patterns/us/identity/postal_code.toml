# US ZIP code: 5 digits, optionally with the +4 add-on
# (`12345` or `12345-6789`). Validated by `us.postal_code`.

name = "us-postal-code"
label = "postal_code"
countries = ["US"]
context = [
  "zip",
  "zip code",
  "zipcode",
  "postal",
  "postal code",
  "address",
  "mailing",
]

[[variants]]
regex = "\\b\\d{5}(?:-\\d{4})?\\b"
score = 0.1
validator = "us.postal_code"
