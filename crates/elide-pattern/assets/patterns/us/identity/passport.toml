# US passport number: one letter followed by 8 digits (older
# book-style format). Low score on its own; the context boost
# lifts hits near passport-related keywords.

name = "us-passport"
label = "passport_number"
countries = ["US"]
context = [
  "passport",
  "passport#",
  "travel document",
  "us passport",
  "united states passport",
]

[[variants]]
regex = "\\b[A-Z]\\d{8}\\b"
score = 0.1
