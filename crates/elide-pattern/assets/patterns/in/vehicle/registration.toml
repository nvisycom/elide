# Indian vehicle registration: state code (2 letters) + RTO
# district (2 digits) + series (1-3 letters) + serial (4 digits).
# Per-state district codes are not validated here; relying on
# the canonical structural pattern + RTO/registration context.

name = "in-vehicle-registration"
label = "license_plate"
countries = ["IN"]
languages = ["en", "hi"]
context = [
  "rto",
  "vehicle",
  "registration plate",
  "vehicle number",
  "regional transport office",
]

# Canonical: SS-DD-LL-NNNN.
[[variants]]
regex = '\b[A-Z]{2}\d{2}[A-Z]{1,2}\d{4}\b'
score = 0.5

# Older single-letter series: SS-D-LLL-NNNN.
[[variants]]
regex = '\b[A-Z]{2}\d[A-Z]{1,3}\d{4}\b'
score = 0.4

# Diplomatic / armed forces prefixes.
[[variants]]
regex = '\b\d{1,3}(CD|CC|UN)[1-9]\d{1,3}\b'
score = 0.4
