# Polish PESEL (Powszechny Elektroniczny System Ewidencji
# Ludności): 11 digits encoding birth date + sex + serial +
# weighted-mod-10 check digit. The regex enforces structural
# sanity (day 01-31, month range using +20/+40/+60/+80
# Ergänzung).

name = "pl-pesel"
label = "government_id"
countries = ["PL"]
languages = ["pl"]
context = [
  "pesel",
  "numer pesel",
  "numer ewidencyjny",
  "ewidencja ludności",
]

[[variants]]
regex = '\b\d{2}([02468][1-9]|[13579][012])(0[1-9]|1[0-9]|2[0-9]|3[01])\d{5}\b'
score = 0.4
validator = "pl.pesel"
