# International phone number: optional +country code, then 2-4
# digit area/prefix groups separated by spaces, dots, or hyphens.
# Loose by design; the `phone` validator confirms parseability.

name = "phone"
label = "phone_number"

[context]
en = ["phone", "call", "mobile", "tel", "fax", "contact"]
es = ["teléfono", "telefono", "llamar", "móvil", "movil", "celular", "tel", "fax", "contacto"]
de = ["telefon", "anruf", "mobil", "handy", "tel", "fax", "kontakt"]
fr = ["téléphone", "telephone", "appel", "mobile", "portable", "tel", "fax", "contact"]

[[variants]]
regex = "(?:\\+\\d{1,3}[\\s.\\-]?)?\\(?\\d{2,4}\\)?[\\s.\\-]?\\d{3,4}[\\s.\\-]?\\d{4}\\b"
score = 0.4
validator = "phone"
