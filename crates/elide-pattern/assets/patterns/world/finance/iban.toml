# International Bank Account Number: 2-letter country code, 2 check
# digits, then up to 30 alphanumerics in optional 4-char groups.
# Validated by `iban` (per-country length + mod-97 checksum).

name = "iban"
label = "iban"
context = ["iban", "bank", "account", "transfer", "swift"]

[[variants]]
regex = "\\b[A-Z]{2}\\d{2}[\\s\\-]?[A-Z0-9]{4}[\\s\\-]?(?:[A-Z0-9]{4}[\\s\\-]?){2,7}[A-Z0-9]{1,4}\\b"
score = 0.5
validator = "iban"
